{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<h2>Users</h2>
<p><a href="{{ url_for('user_create') }}" role="button">New User</a></p>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Initials</th>
      <th>Active</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
    <tr>
      <td><a href="{{ url_for('user_detail', id=user.id) }}">{{ user.name }}</a></td>
      <td>{{ user.initials or '' }}</td>
      <td>{{ 'Yes' if user.active else 'No' }}</td>
      <td><a href="{{ url_for('user_edit', id=user.id) }}">Edit</a></td>
    </tr>
    {% else %}
    <tr><td colspan="4">No users yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
