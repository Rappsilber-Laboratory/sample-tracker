{% extends "base.html" %}
{% block title %}{{ user.name }}{% endblock %}
{% block content %}
<h2>{{ user.name }}</h2>
<p>
  <a href="{{ url_for('user_edit', id=user.id) }}">Edit</a>
  &middot;
  <a href="{{ url_for('user_list') }}">Back to Users</a>
</p>
<table>
  <tbody>
    <tr><th>Name</th><td>{{ user.name }}</td></tr>
    {% if user.initials %}<tr><th>Initials</th><td>{{ user.initials }}</td></tr>{% endif %}
    <tr><th>Active</th><td>{{ 'Yes' if user.active else 'No' }}</td></tr>
  </tbody>
</table>
{% endblock %}
