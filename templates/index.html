{% extends "base.html" %}
{% block title %}Dashboard — Sample Tracker{% endblock %}
{% block content %}
<div id="dashboard">
  <div id="tree-container"></div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/simple-tree-widget.js') }}"></script>
<script>
  fetch('/api/tree')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      TreeWidget.render('#tree-container', data, {
        levelNames: ['', 'Projects', 'Experiments', 'Samples', 'Files'],
        dy: 220,
        hideRoot: true
      });
    });
</script>
{% endblock %}
