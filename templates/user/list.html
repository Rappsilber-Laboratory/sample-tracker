{% extends "base.html" %}
{% block title %}Users — Sample Tracker{% endblock %}
{% block content %}
<h2>Users</h2>
<p><a href="{{ url_for('user_create') }}" role="button">New User</a></p>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Initials</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
    <tr>
      <td>{{ user.name }}</td>
      <td>{{ user.initials or '' }}</td>
      <td><a href="{{ url_for('user_edit', id=user.id) }}">Edit</a></td>
    </tr>
    {% else %}
    <tr><td colspan="3">No users yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
